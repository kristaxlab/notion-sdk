workspace:
  id: "test-workspace"
  timeout: 5000
  enabled: true

config:
  settings:
# TODO implement fail-on-unknown-properties
    fail-on-unknown-properties: true

notion:
  plan: free # TODO other plans for testing
  endpoints:
    file-uploads:
      stream-after-bytes: 5242880 # 5 MB
      split-size-bytes: 10485760 # 10 MB

    pages:
      create-page:
        parent-page: 2f4cd6cf14068001ac57e261d1c18fda
        timeout: 30
      update-page:
        timeout: 20

common-media:
  images:
    external:
      mountains: "https://images.unsplash.com/photo-1665939858489-897d566b6650?q=80&w=2748&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
      notion-api-image: "https://www.notion.so/front-static/external/readme/images/api-hanging@2x.png"


nested:
  config:
    settings:
      debug: false
      max_retries: 3

