name: Build Notion SDK

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:

  build:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'dev' }}

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      # 1
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      # 2
      - name: 2. Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      # 3
      - name: 3. Grant execute permission for Gradle
        run: chmod +x gradlew

      # 4.
#      - name: 4. Code style check (Spotless)
#        run: ./gradlew spotlessCheck

      # 5
      - name: 5. Build with Gradle
        env:
          TESTING_BOT_TOKEN: ${{ secrets.TESTING_BOT_TOKEN }}
        run: ./gradlew clean build

      - name: 5a. Run Integration Tests
        if: success() || failure()  # Run even if unit tests fail
        env:
          TESTING_BOT_TOKEN: ${{ secrets.TESTING_BOT_TOKEN }}
        run: ./gradlew integrationTest


      - name: Coverage
        if: always()
        run: ./gradlew jacocoTestReport jacocoIntegrationTestReport

      - name: Prepare Pages content
        if: always()
        run: |
          # Create report folder name with branch, timestamp, and commit
          BRANCH_NAME="${{ github.ref_name }}"
          TIMESTAMP=$(date +"%Y-%m-%d-%Hh%Mm%Ss")
          COMMIT_SHORT="${{ github.sha }}"
          COMMIT_SHORT=${COMMIT_SHORT:0:7}
          REPORT_FOLDER="${BRANCH_NAME}-${TIMESTAMP}-${COMMIT_SHORT}"
          GITHUB_ACTOR="${{ github.actor }}"
          COMMIT_TIMESTAMP=$(git show -s --format=%ct)
          
          echo "REPORT_FOLDER=${REPORT_FOLDER}" >> $GITHUB_ENV
          echo "GITHUB_ACTOR=${GITHUB_ACTOR}" >> $GITHUB_ENV
          echo "COMMIT_TIMESTAMP=${COMMIT_TIMESTAMP}" >> $GITHUB_ENV
          mkdir -p pages/jacoco/${REPORT_FOLDER}/unit
          mkdir -p pages/jacoco/${REPORT_FOLDER}/integration

          cp -r build/reports/tests/test/* pages/jacoco/${REPORT_FOLDER}/unit/
          cp -r build/reports/tests/integrationTest/* pages/jacoco/${REPORT_FOLDER}/integration/

          # Copy JaCoCo coverage reports if they exist
          if [ -d "build/reports/jacoco/test" ]; then
            mkdir -p "pages/jacoco/${REPORT_FOLDER}/coverage"
            cp -r build/reports/jacoco/test/* "pages/jacoco/${REPORT_FOLDER}/coverage/"
          fi
          
          # Extract test statistics
          # Unit tests stats from index.html
          unit_passed=0
          unit_total=0
          if [ -f "pages/jacoco/${REPORT_FOLDER}/unit/index.html" ]; then
            unit_stats=$(grep -oP '(?<=<div class="percent">)[0-9]+(?=%</div>)|(?<=<div id="tests">)[^<]+(?=</div>)' "pages/jacoco/${REPORT_FOLDER}/unit/index.html" | head -2 || echo "")
            if [ -n "$unit_stats" ]; then
              unit_total=$(echo "$unit_stats" | sed -n '1p' | grep -oP '\d+' | tail -1 || echo "0")
              unit_passed=$unit_total
            fi
          fi
          
          # Integration tests stats
          integration_passed=0
          integration_total=0
          if [ -f "pages/jacoco/${REPORT_FOLDER}/integration/index.html" ]; then
            integration_stats=$(grep -oP '(?<=<div id="tests">)[^<]+(?=</div>)' "pages/jacoco/${REPORT_FOLDER}/integration/index.html" | head -1 || echo "")
            if [ -n "$integration_stats" ]; then
              integration_total=$(echo "$integration_stats" | grep -oP '\d+' | tail -1 || echo "0")
              integration_passed=$integration_total
            fi
          fi
          
          # Coverage percentage from JaCoCo XML report
          coverage_percent="0"
          if [ -f "pages/jacoco/${REPORT_FOLDER}/coverage/jacocoTestReport.xml" ]; then
            coverage_percent=$(grep -oP '(?<=type="INSTRUCTION" missed=")[0-9]+(?=" covered=")' "pages/jacoco/${REPORT_FOLDER}/coverage/jacocoTestReport.xml" | head -1 || echo "0")
            coverage_covered=$(grep -oP '(?<=type="INSTRUCTION" missed="[0-9]+" covered=")[0-9]+(?=")' "pages/jacoco/${REPORT_FOLDER}/coverage/jacocoTestReport.xml" | head -1 || echo "0")
            if [ "$coverage_percent" != "0" ] || [ "$coverage_covered" != "0" ]; then
              total=$((coverage_percent + coverage_covered))
              if [ $total -gt 0 ]; then
                coverage_percent=$(awk "BEGIN {printf \"%.0f\", ($coverage_covered / $total) * 100}")
              fi
            fi
          fi
          
          # Save metadata for this report
          cat > "pages/jacoco/${REPORT_FOLDER}/.metadata" << EOF
          author=${GITHUB_ACTOR}
          timestamp=${COMMIT_TIMESTAMP}
          unit_passed=${unit_passed}
          unit_total=${unit_total}
          integration_passed=${integration_passed}
          integration_total=${integration_total}
          coverage_percent=${coverage_percent}
          EOF

      - name: Checkout existing gh-pages
        if: always()
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: existing_pages
          fetch-depth: 0
        continue-on-error: true


      - name: Merge with existing reports
        if: always()
        run: |
          # Copy existing reports if they exist
          if [ -d "existing_pages/jacoco" ]; then
            cp -r existing_pages/jacoco/* pages/jacoco/ || true
          fi
          
          # Copy the index.html template
          cp .github/pages-template/index.html pages/index.html
          
          # Generate reports.json with all report metadata
          echo "[" > pages/reports.json
          
          first=true
          for report_dir in pages/jacoco/*/; do
            if [ -d "$report_dir" ]; then
              folder_name=$(basename "$report_dir")
              
              # Parse folder name: branch-YYYY-MM-DD-HHhMMmSSs-commit
              branch=$(echo "$folder_name" | sed -E 's/^(.*)-[0-9]{4}-[0-9]{2}-[0-9]{2}-[0-9]{2}h[0-9]{2}m[0-9]{2}s-[a-f0-9]{7}$/\1/')
              date_part=$(echo "$folder_name" | sed -E 's/^.*-([0-9]{4}-[0-9]{2}-[0-9]{2})-[0-9]{2}h[0-9]{2}m[0-9]{2}s-[a-f0-9]{7}$/\1/')
              time_part=$(echo "$folder_name" | sed -E 's/^.*-[0-9]{4}-[0-9]{2}-[0-9]{2}-([0-9]{2})h([0-9]{2})m([0-9]{2})s-[a-f0-9]{7}$/\1:\2:\3/')
              commit=$(echo "$folder_name" | sed -E 's/^.*-[0-9]{4}-[0-9]{2}-[0-9]{2}-[0-9]{2}h[0-9]{2}m[0-9]{2}s-([a-f0-9]{7})$/\1/')
              
              # Extract author and timestamp from folder metadata if it exists
              metadata_file="$report_dir/.metadata"
              if [ -f "$metadata_file" ]; then
                author=$(cat "$metadata_file" | grep "^author=" | cut -d'=' -f2)
                timestamp=$(cat "$metadata_file" | grep "^timestamp=" | cut -d'=' -f2)
                unit_passed=$(cat "$metadata_file" | grep "^unit_passed=" | cut -d'=' -f2 || echo "0")
                unit_total=$(cat "$metadata_file" | grep "^unit_total=" | cut -d'=' -f2 || echo "0")
                integration_passed=$(cat "$metadata_file" | grep "^integration_passed=" | cut -d'=' -f2 || echo "0")
                integration_total=$(cat "$metadata_file" | grep "^integration_total=" | cut -d'=' -f2 || echo "0")
                coverage_percent=$(cat "$metadata_file" | grep "^coverage_percent=" | cut -d'=' -f2 || echo "0")
              else
                author="unknown"
                timestamp=$(date +%s)
                unit_passed="0"
                unit_total="0"
                integration_passed="0"
                integration_total="0"
                coverage_percent="0"
              fi
              
              # Add comma if not first item
              if [ "$first" = false ]; then
                echo "," >> pages/reports.json
              fi
              first=false
              
              # Check what reports exist
              has_unit=$([ -d "$report_dir/unit" ] && echo "true" || echo "false")
              has_integration=$([ -d "$report_dir/integration" ] && echo "true" || echo "false")
              has_coverage=$([ -d "$report_dir/coverage" ] && echo "true" || echo "false")
              
              # Generate JSON object using echo
              echo "  {" >> pages/reports.json
              echo "    \"folder\": \"$folder_name\"," >> pages/reports.json
              echo "    \"branch\": \"$branch\"," >> pages/reports.json
              echo "    \"date\": \"$date_part\"," >> pages/reports.json
              echo "    \"time\": \"$time_part\"," >> pages/reports.json
              echo "    \"commit\": \"$commit\"," >> pages/reports.json
              echo "    \"author\": \"$author\"," >> pages/reports.json
              echo "    \"timestamp\": $timestamp," >> pages/reports.json
              echo "    \"hasUnit\": $has_unit," >> pages/reports.json
              echo "    \"hasIntegration\": $has_integration," >> pages/reports.json
              echo "    \"hasCoverage\": $has_coverage," >> pages/reports.json
              echo "    \"unitPassed\": $unit_passed," >> pages/reports.json
              echo "    \"unitTotal\": $unit_total," >> pages/reports.json
              echo "    \"integrationPassed\": $integration_passed," >> pages/reports.json
              echo "    \"integrationTotal\": $integration_total," >> pages/reports.json
              echo "    \"coveragePercent\": $coverage_percent" >> pages/reports.json
              echo "  }" >> pages/reports.json
            fi
          done
          
          echo "" >> pages/reports.json
          echo "]" >> pages/reports.json

      - name: Publish to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: pages
          keep_files: false