name: Build Notion SDK

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:

  build:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'dev' }}

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      # 1
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      # 2
      - name: 2. Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      # 3
      - name: 3. Grant execute permission for Gradle
        run: chmod +x gradlew

      # 4.
      - name: 4. Code style check (Spotless)
        run: ./gradlew spotlessCheck

      # 5
      - name: 5. Build with Gradle
        env:
          TESTING_BOT_TOKEN: ${{ secrets.TESTING_BOT_TOKEN }}
        run: ./gradlew clean build

      - name: 5a. Run Integration Tests
        if: success() || failure()  # Run even if unit tests fail
        env:
          TESTING_BOT_TOKEN: ${{ secrets.TESTING_BOT_TOKEN }}
        run: ./gradlew integrationTest

      - name: Checkout existing gh-pages
        if: always()
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: existing_pages
          fetch-depth: 0
        continue-on-error: true

      - name: Merge with existing reports
        if: always()
        run: |
          BRANCH_NAME="${GITHUB_REF_NAME}"
          SAFE_BRANCH_NAME=$(echo "$BRANCH_NAME" | sed 's/[^a-zA-Z0-9-]/_/g')
          
          mkdir -p pages
          
          # Copy all existing reports to preserve other branches
          if [ -d "existing_pages" ]; then
            cp -r existing_pages/* pages/ || true
          fi
          
          # Remove old reports for this branch to ensure latest results override
          BRANCH_REPORTS_DIR="pages/reports/${SAFE_BRANCH_NAME}/latest"
          if [ -d "${BRANCH_REPORTS_DIR}" ]; then
            echo "🗑️  Removing old reports for branch: ${SAFE_BRANCH_NAME}"
            rm -rf "${BRANCH_REPORTS_DIR}"
          fi
          
          # Create fresh branch-specific directory structure
          mkdir -p "${BRANCH_REPORTS_DIR}/test"
          mkdir -p "${BRANCH_REPORTS_DIR}/integrationTest"
          mkdir -p "${BRANCH_REPORTS_DIR}/coverage"
          
          # Copy test reports
          if [ -d "build/reports/tests/test" ]; then
            cp -r build/reports/tests/test/* "${BRANCH_REPORTS_DIR}/test/" || true
            echo "✅ Copied test reports"
          fi
          
          # Copy integration test reports
          if [ -d "build/reports/tests/integrationTest" ]; then
            cp -r build/reports/tests/integrationTest/* "${BRANCH_REPORTS_DIR}/integrationTest/" || true
            echo "✅ Copied integration test reports"
          fi
          
          # Copy coverage reports
          if [ -d "build/reports/jacoco/test" ]; then
            cp -r build/reports/jacoco/test/html/* "${BRANCH_REPORTS_DIR}/coverage/" || true
            echo "✅ Copied coverage reports"
          fi
          
          # Display in logs
          echo ""
          echo "📊 =========================================="
          echo "📊 Reports published for branch: ${BRANCH_NAME}"
          echo "📊 =========================================="
          
          # Create GitHub Job Summary (visible at the top of the workflow run)
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## 📊 Test Reports Published
          
          **Branch:** \`${BRANCH_NAME}\`
          - Test Reports: https://kristaxlab.github.io/notion-sdk/reports/${SAFE_BRANCH_NAME}/latest/test/
          - Integration Test Reports: https://kristaxlab.github.io/notion-sdk/reports/${SAFE_BRANCH_NAME}/latest/integrationTest/
          - Coverage Reports: https://kristaxlab.github.io/notion-sdk/reports/${SAFE_BRANCH_NAME}/latest/coverage/
          EOF
          
          echo "✅ Report links added to Job Summary"

      - name: Publish to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: pages
          keep_files: true
