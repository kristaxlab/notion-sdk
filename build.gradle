plugins {
    id 'java'
    id 'jacoco'
    id 'com.diffplug.spotless' version '7.2.1'
}

group = 'io.github.kristixlab'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.18.1'
    implementation 'com.fasterxml.jackson.datatype:jackson-datatype-jsr310:2.15.2'
    implementation 'org.projectlombok:lombok:1.18.32'
    annotationProcessor 'org.projectlombok:lombok:1.18.32'

    implementation 'org.slf4j:slf4j-api:2.0.17'
    implementation 'org.apache.logging.log4j:log4j-core:2.20.0'
    implementation 'org.apache.logging.log4j:log4j-slf4j2-impl:2.20.0'
    implementation 'com.squareup.okhttp3:okhttp:5.1.0'
    implementation 'com.bucket4j:bucket4j-core:8.10.1'

    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testImplementation 'org.projectlombok:lombok:1.18.32'
    testImplementation 'org.yaml:snakeyaml:2.2'
    testAnnotationProcessor 'org.projectlombok:lombok:1.18.32'
}

test {
    useJUnitPlatform()
    finalizedBy jacocoTestReport
    exclude 'io/kristixlab/notion/api/examples/**'
    exclude 'io/kristixlab/notion/api/integration/**'
    jacoco {
        destinationFile = layout.buildDirectory.file("jacoco/test.exec").get().asFile
    }
}

tasks.register('integrationTest', Test) {
    description = 'Runs integration tests'
    group = 'verification'

    environment("TESTING_BOT_TOKEN", System.getProperty("TESTING_BOT_TOKEN"))
    testClassesDirs = sourceSets.test.output.classesDirs
    classpath = sourceSets.test.runtimeClasspath

    include 'io/kristixlab/notion/api/integration/**'
    shouldRunAfter test

    useJUnitPlatform()

    jacoco {
        destinationFile = layout.buildDirectory.file("jacoco/integrationTest.exec").get().asFile
    }
    finalizedBy jacocoIntegrationTestReport
}


jacocoTestReport {
    dependsOn test
    executionData layout.buildDirectory.file("jacoco/test.exec")

    sourceDirectories.from files(sourceSets.main.allSource.srcDirs)
    classDirectories.from files(sourceSets.main.output)

    reports {
        xml.required = true
        html.required = true
        csv.required = false
        html.outputLocation = layout.buildDirectory.dir("reports/jacoco/test/html")
        xml.outputLocation = layout.buildDirectory.file("reports/jacoco/test/jacocoTestReport.xml")
    }
}

tasks.register('jacocoIntegrationTestReport', JacocoReport) {
    dependsOn integrationTest
    onlyIf {
        layout.buildDirectory.file("jacoco/integrationTest.exec").get().asFile.exists()
    }
    executionData layout.buildDirectory.file("jacoco/integrationTest.exec")

    sourceDirectories.from files(sourceSets.main.allSource.srcDirs)
    classDirectories.from files(sourceSets.main.output)

    reports {
        xml.required = true
        html.required = true
        csv.required = false
        html.outputLocation = layout.buildDirectory.dir("reports/jacoco/integrationTest/html")
        xml.outputLocation = layout.buildDirectory.file("reports/jacoco/integrationTest/jacocoIntegrationTestReport.xml")
    }
}

// Configure JaCoCo version and exclusions
jacoco {
    toolVersion = "0.8.11"
}

// Configure JaCoCo to exclude @lombok.Generated annotated methods
tasks.withType(Test) {
    jacoco {
        excludes += ['**/*$Generated*']
        // Exclude common Lombok generated method patterns
        excludes += ['**/*$$*'] // Inner classes generated by Lombok
    }
}

spotless {
    java {
        googleJavaFormat('1.28.0')
        removeUnusedImports()
        trimTrailingWhitespace()
        endWithNewline()
    }
}